version: "3.7"

services:
  api:
    volumes:
      - ./.dev/config.compose.minio.toml:/app/config/config.toml:ro

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: record_analysis_minio
      MINIO_ROOT_PASSWORD: record_analysis_minio_secret
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  minio_data:

version: "3.7"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: record_analysis
      POSTGRES_PASSWORD: record_analysis
      POSTGRES_DB: record_analysis
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U record_analysis -d record_analysis"]
      interval: 5s
      timeout: 3s
      retries: 20

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: RecordAnalysis1!
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    environment:
      MINIO_ROOT_USER: record_analysis_minio
      MINIO_ROOT_PASSWORD: record_analysis_minio_secret
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
